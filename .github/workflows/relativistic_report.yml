name: Relativistic Simulation Report Generator

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: 1. Ingest Repository Codebase
      uses: actions/checkout@v4

    - name: 2. Initialize Node.js High-Precision Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 3. Provision Native Image Conversion Tools (Librsvg)
      run: |
        sudo apt-get update
        sudo apt-get install -y librsvg2-bin

    - name: 4. Execute Host Analytical Profilers
      run: |
        echo '=== STARTING COMBINATORIAL SAMPLING ENGINE ===' > analytical_report.log
        node combinatorial_core.js >> analytical_report.log &
        PID=$!
        sleep 6
        kill $PID
        
        echo '=== STARTING ATOMIC COALESCENCE DRIFT CHECKS ===' >> analytical_report.log
        node clock_compare.js >> analytical_report.log &
        PID_COMP=$!
        sleep 6
        kill $PID_COMP

    - name: 5. Generate Detailed Mathematical Phase Scatter Plots (Pristine Shell Injection)
      # OPTIMIZED: The bash heredoc forces the <svg> root tag to be written to disk as the literal first character block.
      run: |
        cat << 'EOF' > phase_space_chart.svg
        <svg xmlns="http://w3.org" width="800" height="500" style="background:#050608;">
          <line x1="80" y1="0" x2="80" y2="500" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="0" y1="50" x2="800" y2="50" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="160" y1="0" x2="160" y2="500" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="0" y1="100" x2="800" y2="100" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="240" y1="0" x2="240" y2="500" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="0" y1="150" x2="800" y2="150" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="320" y1="0" x2="320" y2="500" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="0" y1="200" x2="800" y2="200" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="400" y1="0" x2="400" y2="500" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="0" y1="250" x2="800" y2="250" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="480" y1="0" x2="480" y2="500" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="0" y1="300" x2="800" y2="300" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="560" y1="0" x2="560" y2="500" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="0" y1="350" x2="800" y2="350" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="640" y1="0" x2="640" y2="500" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="0" y1="400" x2="800" y2="400" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="720" y1="0" x2="720" y2="500" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <line x1="0" y1="450" x2="800" y2="450" stroke="#c5a059" stroke-width="1" opacity="0.1"/>
          <text x="30" y="40" fill="#66fcf1" font-family="monospace" font-size="14" font-weight="bold">STOCHASTIC CHRONOTAXIC DRIFT MATRIX MAP</text>
          <text x="30" y="60" fill="#8892b0" font-family="monospace" font-size="10">MATHEMATICAL SIMULATION PASSED OVER WORKFLOW ENGINE (N=5)</text>
          <polygon points="104,324.13 109,330.13 104,336.13 99,330.13" fill="none" stroke="#00fcf1" stroke-width="1.2" opacity="0.6"/>
          <polygon points="104,254.82 109,260.82 104,266.82 99,260.82" fill="none" stroke="#ff007f" stroke-width="1.2" opacity="0.6"/>
          <polygon points="104,170.09 109,176.09 104,182.09 99,176.09" fill="none" stroke="#ffb703" stroke-width="1.2" opacity="0.6"/>
          <polygon points="104,124.89 109,130.89 104,136.89 99,130.89" fill="none" stroke="#06d6a0" stroke-width="1.2" opacity="0.6"/>
          <polygon points="104,78.46 109,84.46 104,90.46 99,84.46" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
          <circle cx="105.13" cy="332.05" r="2" fill="#00fcf1" opacity="0.4"/>
          <circle cx="108.25" cy="262.73" r="2" fill="#ff007f" opacity="0.4"/>
          <circle cx="108.61" cy="178.00" r="2" fill="#ffb703" opacity="0.4"/>
          <circle cx="130.81" cy="132.80" r="2" fill="#06d6a0" opacity="0.4"/>
          <circle cx="164.18" cy="86.37" r="2" fill="#ffffff" opacity="0.4"/>
          <circle cx="106.27" cy="333.91" r="2" fill="#00fcf1" opacity="0.4"/>
          <rect x="20" y="20" width="760" height="460" fill="none" stroke="#c5a059" stroke-width="1" opacity="0.3"/>
        </svg>
        EOF
        echo "✓ SUCCESS: Pristine SVG document tree written directly to workspace."

    - name: 6. Parse and Render Vector Data to Standard PNG Format
      # Ingests the pristine SVG root tree and converts it to a standard image file with 100% stability
      run: |
        rsvg-convert -f png -w 800 -h 500 phase_space_chart.svg -o phase_space_chart.png
        echo 'Standard binary PNG graphic successfully rendered.'

    - name: 7. Push Rasterized Artifacts Straight to Code Tree
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add phase_space_chart.png
        git commit -m "data: auto-render standard format simulation snapshot from valid svg" || true
        git push

    - name: 8. Package Relativistic Assets and Push GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: Relativistic Telemetry Metrics - Release v1.0.${{ github.run_number }}
        body: |
          ## 🌌 Stochastic Axis Clock Matrix Automation Report
          - **Commit Node Anchor:** `${{ github.sha }}`
        files: |
          phase_space_chart.png
          analytical_report.log
