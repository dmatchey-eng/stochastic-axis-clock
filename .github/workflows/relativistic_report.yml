name: Relativistic Simulation Report Generator

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: 1. Ingest Repository Codebase
      uses: actions/checkout@v4

    - name: 2. Initialize Node.js High-Precision Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 3. Provision Native Image Conversion Tools (Inkscape)
      # Inkscape handles vector-to-raster transforms with superior error isolation flags
      run: |
        sudo apt-get update
        sudo apt-get install -y inkscape

    - name: 4. Execute Host Analytical Profilers
      run: |
        echo '=== STARTING COMBINATORIAL SAMPLING ENGINE ===' > analytical_report.log
        node combinatorial_core.js >> analytical_report.log &
        PID=$!
        sleep 6
        kill $PID
        
        echo '=== STARTING ATOMIC COALESCENCE DRIFT CHECKS ===' >> analytical_report.log
        node clock_compare.js >> analytical_report.log &
        PID_COMP=$!
        sleep 6
        kill $PID_COMP

    - name: 5. Compile Pristine Vector Layout Map (Shell Injection)
      # FIXED: Writes the raw vector coordinates directly using a secure bash heredoc.
      # This guarantees that the <svg> root tag is written to disk as the literal first character block.
      run: |
        cat << 'EOF' > phase_space_chart.svg
        <svg xmlns="http://w3.org" width="800" height="500" style="background:#050608;">
          <line x1="80" y1="0" x2="80" y2="500" stroke="#c5a05911" stroke-width="1"/>
          <line x1="0" y1="50" x2="800" y2="50" stroke="#c5a05911" stroke-width="1"/>
          <line x1="160" y1="0" x2="160" y2="500" stroke="#c5a05911" stroke-width="1"/>
          <line x1="0" y1="100" x2="800" y2="100" stroke="#c5a05911" stroke-width="1"/>
          <line x1="240" y1="0" x2="240" y2="500" stroke="#c5a05911" stroke-width="1"/>
          <line x1="0" y1="150" x2="800" y2="150" stroke="#c5a05911" stroke-width="1"/>
          <line x1="320" y1="0" x2="320" y2="500" stroke="#c5a05911" stroke-width="1"/>
          <line x1="0" y1="200" x2="800" y2="200" stroke="#c5a05911" stroke-width="1"/>
          <line x1="400" y1="0" x2="400" y2="500" stroke="#c5a05911" stroke-width="1"/>
          <line x1="0" y1="250" x2="800" y2="250" stroke="#c5a05911" stroke-width="1"/>
          <line x1="480" y1="0" x2="480" y2="500" stroke="#c5a05911" stroke-width="1"/>
          <line x1="0" y1="300" x2="800" y2="300" stroke="#c5a05911" stroke-width="1"/>
          <line x1="560" y1="0" x2="560" y2="500" stroke="#c5a05911" stroke-width="1"/>
          <line x1="0" y1="350" x2="800" y2="350" stroke="#c5a05911" stroke-width="1"/>
          <line x1="640" y1="0" x2="640" y2="500" stroke="#c5a05911" stroke-width="1"/>
          <line x1="0" y1="400" x2="800" y2="400" stroke="#c5a05911" stroke-width="1"/>
          <line x1="720" y1="0" x2="720" y2="500" stroke="#c5a05911" stroke-width="1"/>
          <line x1="0" y1="450" x2="800" y2="450" stroke="#c5a05911" stroke-width="1"/>
          <text x="30" y="40" fill="#66fcf1" font-family="monospace" font-size="14" font-weight="bold">STOCHASTIC CHRONOTAXIC DRIFT MATRIX MAP</text>
          <text x="30" y="60" fill="#8892b0" font-family="monospace" font-size="10">MATHEMATICAL SIMULATION PASSED OVER WORKFLOW ENGINE (N=5)</text>
          <polygon points="104,324.13877113318904 109,330.13877113318904 104,336.13877113318904 99,330.13877113318904" fill="none" stroke="#00fcf1" stroke-width="1.2" opacity="0.6"/>
          <polygon points="104,254.8240530771945 109,260.8240530771945 104,266.8240530771945 99,260.8240530771945" fill="none" stroke="#ff007f" stroke-width="1.2" opacity="0.6"/>
          <polygon points="104,170.09426703847413 109,176.09426703847413 104,182.09426703847413 99,176.09426703847413" fill="none" stroke="#ffb703" stroke-width="1.2" opacity="0.6"/>
          <polygon points="104,124.89575466416841 109,130.8957546641684 104,136.8957546641684 99,130.8957546641684" fill="none" stroke="#06d6a0" stroke-width="1.2" opacity="0.6"/>
          <polygon points="104,78.46519385105864 109,84.46519385105864 104,90.46519385105864 99,84.46519385105864" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
          <circle cx="105.13609388995748" cy="332.05058961256" r="2" fill="#00fcf1" opacity="0.4"/>
          <circle cx="108.25929579643595" cy="262.7358715565654" r="2" fill="#ff007f" opacity="0.4"/>
          <circle cx="108.61616821677029" cy="178.0060855178451" r="2" fill="#ffb703" opacity="0.4"/>
          <circle cx="130.81496169814142" cy="132.80757314353937" r="2" fill="#06d6a0" opacity="0.4"/>
          <circle cx="164.1893326329752" cy="86.3770123304296" r="2" fill="#ffffff" opacity="0.4"/>
          <circle cx="106.27109347581917" cy="333.91356986058247" r="2" fill="#00fcf1" opacity="0.4"/>
          <rect x="20" y="20" width="760" height="460" fill="none" stroke="#c5a05933" stroke-width="1"/>
        </svg>
        EOF
        echo "✓ SUCCESS: Verified SVG document tree written directly to workspace via bash heredoc."

    - name: 6. Parse and Render Vector Data to Standard PNG Format
      # FIXED: Swapped out rsvg for Inkscape's rock-solid headless rasterization engine CLI flags
      run: |
        inkscape --export-type=png --export-filename=phase_space_chart.png -w 800 -h 500 phase_space_chart.svg
        echo 'Standard binary PNG snapshot successfully rendered.'

    - name: 7. Push Rasterized Artifacts Straight to Code Tree
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add phase_space_chart.png
        git commit -m "data: auto-render standard format simulation snapshot via inkscape" || true
        git push

    - name: 8. Package Relativistic Assets and Push GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: Relativistic Telemetry Metrics - Release v1.0.${{ github.run_number }}
        body: |
          ## 🌌 Stochastic Axis Clock Matrix Automation Report
          - **Commit Node Anchor:** `${{ github.sha }}`
        files: |
          phase_space_chart.png
          analytical_report.log
