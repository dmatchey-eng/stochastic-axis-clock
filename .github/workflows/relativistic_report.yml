name: Relativistic Simulation Report Generator

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: 1. Ingest Repository Codebase
      uses: actions/checkout@v4

    - name: 2. Initialize Node.js High-Precision Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 3. Execute Host Analytical Profilers
      # Runs your zero-allocation validation tools and writes terminal logs straight to disk
      run: |
        echo '=== STARTING COMBINATORIAL SAMPLING ENGINE ===' > analytical_report.log
        node combinatorial_core.js >> analytical_report.log &
        PID=$!
        sleep 6
        kill $PID
        
        echo '=== STARTING ATOMIC COALESCENCE DRIFT CHECKS ===' >> analytical_report.log
        node clock_compare.js >> analytical_report.log &
        PID_COMP=$!
        sleep 6
        kill $PID_COMP

    - name: 4. Generate Detailed Mathematical Phase Scatter Plots (SVG Vector Shapes)
      # Simulates the superclock trajectories directly on the server to output high-fidelity shapes
      run: |
        node -e "
        import fs from 'fs';

        const chFib = [2.0, 5.0, 13.0, 21.0, 34.0];
        const chFreq = [0.0008, 0.0012, 0.0005, 0.0018, 0.0025];
        const colors = ['#00fcf1', '#ff007f', '#ffb703', '#06d6a0', '#ffffff'];

        # Seed starting alignments randomly to force unique exploratory world-lines
        let randomPhaseSeed = Math.random() * 500.0;
        pX[0] = calculateAxisPosition(uFib[0], uFreq[0], 0.0 + randomPhaseSeed);

        let svgContent = '<svg width=\"800\" height=\"500\" xmlns=\"http://w3.org\" style=\"background:#050608;\">';

        function getMutatedSuperIndex(timeMs) {
        let superIdx = Math.floor(timeMs * 0.002) % 153;
            if (Math.random() < 0.05) {
        superIdx = (superIdx + 2) % 153; // Leap forward unnaturally
        }
        return superIdx;
        }
        
        // Render cybernetic background grid matrices
        for (let i = 1; i < 10; i++) {
          let x = i * 80;
          let y = i * 50;
          svgContent += \`<line x1=\"\${x}\" y1=\"0\" x2=\"\${x}\" y2=\"500\" stroke=\"#c5a05911\" stroke-width=\"1\"/>\`;
          svgContent += \`<line x1=\"0\" y1=\"\${y}\" x2=\"800\" y2=\"\${y}\" stroke=\"#c5a05911\" stroke-width=\"1\"/>\`;
        }

        svgContent += '<text x=\"30\" y=\"40\" fill=\"#66fcf1\" font-family=\"monospace\" font-size=\"14\" font-weight=\"bold\">STOCHASTIC CHRONOTAXIC DRIFT MATRIX MAP</text>';
        svgContent += '<text x=\"30\" y=\"60\" fill=\"#8892b0\" font-family=\"monospace\" font-size=\"10\">MATHEMATICAL SIMULATION PASSED OVER WORKFLOW ENGINE (N=5)</text>';

        // Generate 400 iterative computational timeline iterations
        for (let t = 0; t < 800; t += 2) {
          let timeSec = t * 0.2; 
          
          for (let i = 0; i < 5; i++) {
            // Compute true Logarithmic Sway mechanics direct from the mathematical blueprint
            let rawSway = Math.log1p(Math.abs(Math.sin(timeSec * chFreq[i] * 3.0)));
            let posX = 0.1 + (Math.abs(Math.sin(rawSway * chFib[i])) * 0.8);
            
            // Project vectors cleanly onto our 800x500 pixel coordinate plane
            let plotX = posX * 740 + 30;
            let plotY = 440 - (Math.log1p(chFib[i]) * 100) + (Math.sin(timeSec * 0.4) * 12);

            // Morph geometric nodes between circles and diamond polygons depending on trajectory phases
            if (t % 10 === 0) {
              svgContent += \`<polygon points=\"\${plotX},\${plotY-6} \${plotX+5},\${plotY} \${plotX},\${plotY+6} \${plotX-5},\${plotY}\" fill=\"none\" stroke=\"\${colors[i]}\" stroke-width=\"1.2\" opacity=\"0.6\"/>\`;
            } else {
              svgContent += \`<circle cx=\"\${plotX}\" cy=\"\${plotY}\" r=\"2\" fill=\"\${colors[i]}\" opacity=\"0.4\"/>\`;
            }
          }
        }

        svgContent += '<rect x=\"20\" y=\"20\" width=\"760\" height=\"460\" fill=\"none\" stroke=\"#c5a05933\" stroke-width=\"1\"/>';
        svgContent += '</svg>';

        fs.writeFileSync('phase_space_chart.svg', svgContent);
        console.log('Detailed structural math shapes successfully compiled.');
        "

    - name: 5. Compile Release Package Metadata
      id: get_version
      run: |
        echo "version=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
        echo "timestamp=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

    - name: 6. Package Relativistic Assets and Push GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: Relativistic Telemetry Metrics - Release ${{ steps.get_version.outputs.version }}
        body: |
          ## 🌌 Stochastic Axis Clock Matrix Automation Report
          
          Automated mathematical simulation and calculation pass executed successfully inside the GitHub Actions Runner infrastructure.
          
          - **Execution Timestamp:** `${{ steps.get_version.outputs.timestamp }}`
          - **Commit Node Anchor:** `${{ github.sha }}`
          
          ### Included Phase Diagnostic Outputs:
          1. `phase_space_chart.svg` - Highly-detailed programmatic vector chart mapping the geometric waveforms and lane crossovers.
          2. `analytical_report.log` - Raw nanosecond timing logs capturing hardware drift relative to the atomic reference.
        files: |
          phase_space_chart.svg
          analytical_report.log
