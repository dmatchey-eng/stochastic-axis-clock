name: Relativistic Simulation Report Generator

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: 1. Ingest Repository Codebase
      uses: actions/checkout@v4

    - name: 2. Initialize Node.js High-Precision Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 3. Provision Native Image Conversion Tools (Librsvg)
      run: |
        sudo apt-get update
        sudo apt-get install -y librsvg2-bin

    - name: 4. Execute and Force-Terminate Host Analytical Profilers
      run: |
        echo '=== STARTING COMBINATORIAL SAMPLING ENGINE ===' > analytical_report.log
        node combinatorial_core.js >> analytical_report.log &
        PID_CORE=$!
        
        echo '=== STARTING ATOMIC COALESCENCE DRIFT CHECKS ===' >> analytical_report.log
        node clock_compare.js >> analytical_report.log &
        PID_COMP=$!
        
        sleep 6
        kill -9 $PID_CORE || true
        kill -9 $PID_COMP || true
        echo '✓ SUCCESS: Background loops frozen and cleared from memory.'

    - name: 5. Compile Pristine Vector Layout Map (Dynamic Hybrid Append)
      # Stage 1: Write your working, verified <svg> root tag as character index 1 to the file disk.
      # Stage 2: Use sed to strip out the first line of phase_space_chart.svg and append the raw data paths fluidly.
      run: |
        echo '<svg>' > workflow_simulation_base.svg
                node -e "
        import fs from 'fs';
        if (fs.existsSync('phase_space_chart.svg')) {
          let rawData = fs.readFileSync('phase_space_chart.svg', 'utf8');
          // Find the exact marker index of the very first closing angle bracket
          let firstBracketIndex = rawData.indexOf('>');
          if (firstBracketIndex !== -1) {
            // Extract everything strictly AFTER the first '>' character
            let detailContent = rawData.substring(firstBracketIndex + 1);
            fs.appendFileSync('workflow_simulation_base.svg', detailContent);
            console.log('✓ Successfully stripped preceding tag block. Detail paths appended.');
          } else {
            console.error('Delimiter bracket not found.');
            process.exit(1);
          }
        } else {
          console.error('Source template missing.');
          process.exit(1);
        }
        "
        echo "✓ SUCCESS: Goodbye successfully hello."


    - name: 6. Parse and Render Vector Data to Standard PNG Format
      run: |
        rsvg-convert -f png -w 800 -h 500 workflow_simulation_base.svg -o phase_space_chart.png
        echo 'Standard binary PNG graphic successfully rendered.'

    - name: 7. Push Rasterized Artifacts Straight to Code Tree
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add phase_space_chart.png
        git commit -m "data: auto-render standard format simulation snapshot from valid svg" || true
        git push

    - name: 8. Package Relativistic Assets and Push GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: Relativistic Telemetry Metrics - Release v1.0.${{ github.run_number }}
        body: |
          ## 🌌 Stochastic Axis Clock Matrix Automation Report
          - **Commit Node Anchor:** `${{ github.sha }}`
        files: |
          phase_space_chart.png
          analytical_report.log
