name: Relativistic Simulation Report Generator

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: 1. Ingest Repository Codebase
      uses: actions/checkout@v4

    - name: 2. Initialize Node.js High-Precision Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 3. Execute Host Analytical Profilers
      run: |
        echo '=== STARTING COMBINATORIAL SAMPLING ENGINE ===' > analytical_report.log
        node combinatorial_core.js >> analytical_report.log &
        PID=$!
        sleep 6
        kill $PID
        
        echo '=== STARTING ATOMIC COALESCENCE DRIFT CHECKS ===' >> analytical_report.log
        node clock_compare.js >> analytical_report.log &
        PID_COMP=$!
        sleep 6
        kill $PID_COMP

    - name: 4. Compile Dynamic Vector Layout Map
      # Executes the standalone file to compute positions cleanly and prevent NaN errors
      run: node generate_matrix.js

    - name: 5. Parse and Render Vector Data to Standard PNG Format
      # FIXED: Swapped 'gm' for the standard 'convert' command, pre-built natively into the OS core image
      run: |
        convert phase_space_chart.svg phase_space_chart.png
        echo "✓ SUCCESS: Standard format PNG snapshot generated."

    - name: 6. Push Rasterized Artifacts Straight to Code Tree
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add phase_space_chart.png
        git commit -m "data: auto-render standard format simulation snapshot" || true
        git push

    - name: 7. Package Relativistic Assets and Push GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: Relativistic Telemetry Metrics - Release v1.0.${{ github.run_number }}
        body: |
          ## 🌌 Stochastic Axis Clock Matrix Automation Report
          - **Commit Node Anchor:** `${{ github.sha }}`
        files: |
          phase_space_chart.png
          analytical_report.log
