name: Relativistic Simulation Report Generator

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: 1. Ingest Repository Codebase
      uses: actions/checkout@v4

    - name: 2. Initialize Node.js High-Precision Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 3. Provision Isolated Node Dependencies
      # Explicitly updates sharp to manage in-memory vector-to-png compilation
      run: npm install sharp

    - name: 4. Execute Host Analytical Profilers
      run: |
        echo '=== STARTING COMBINATORIAL SAMPLING ENGINE ===' > analytical_report.log
        node combinatorial_core.js >> analytical_report.log &
        PID=$!
        sleep 6
        kill $PID
        
        echo '=== STARTING ATOMIC COALESCENCE DRIFT CHECKS ===' >> analytical_report.log
        node clock_compare.js >> analytical_report.log &
        PID_COMP=$!
        sleep 6
        kill $PID_COMP

    - name: 5. Execute Self-Contained Simulation & Image Conversion
      # Triggers generate_matrix.js to compute coordinates and output both files natively
      run: node generate_matrix.js

    - name: 6. Push Rasterized Artifacts Straight to Code Tree
      # Fixed: Tracks and commits phase_space_chart.png securely into your repository tree
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add phase_space_chart.png
        git commit -m "data: auto-render standard format simulation snapshot" || true
        git push

    - name: 7. Compile Release Package Metadata
      id: get_version
      run: |
        echo "version=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
        echo "timestamp=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

    - name: 8. Package Relativistic Assets and Push GitHub Release
      # Fixed: Attaches the .png image file and the logs to the Release deployment package
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: Relativistic Telemetry Metrics - Release v1.0.${{ github.run_number }}
        body: |
          ## 🌌 Stochastic Axis Clock Matrix Automation Report
          - **Execution Timestamp:** `${{ steps.get_version.outputs.timestamp }}`
          - **Commit Node Anchor:** `${{ github.sha }}`
        files: |
          phase_space_chart.png
          analytical_report.log
