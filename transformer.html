<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chrono-Telemetry 3D Transformer Harvester</title>
    <style>
        body { background-color: #030406; color: #66fcf1; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        h1 { font-size: 1.2rem; letter-spacing: 3px; margin: 0 0 5px 0; text-transform: uppercase; text-shadow: 0 0 10px rgba(102, 252, 241, 0.3); }
        .subtitle { color: #c5a059; font-size: 0.8rem; margin-bottom: 20px; text-transform: uppercase; }
        .engine-container { width: 95vw; max-width: 800px; background: #0f1319; border: 1px solid #66fcf1; padding: 15px; box-shadow: 0 0 30px rgba(102, 252, 241, 0.2); display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; }
        canvas { width: 100%; height: 500px; background: #000000; display: block; border: 2px solid #c5a059; }
        .controls { display: flex; justify-content: space-between; align-items: center; background: #050608; padding: 12px 20px; border: 1px solid #c5a05933; font-size: 0.85rem; color: #c5a059; }
    </style>
</head>
<body>

    <h1>TELEMETRY 3D TRANSFORMER</h1>
    <div class="subtitle">Iterative 3D Scatter Generator Connected via Broadcast Bus</div>

    <div class="engine-container">
        <canvas id="glCanvas"></canvas>
        <div class="controls">
            <span>NETWORK STATUS: CONNECTED_INGESTION_BUS</span>
            <span id="vertexCounter">VERTICES MAPPED: 0</span>
        </div>
    </div>

    <script>
        // Connect listener to the cross-window data pipeline
        const telemetryBus = new BroadcastChannel('clock_telemetry');

        const vsSource = `#version 300 es
            in vec3 position;
            in vec3 color;
            uniform mat4 uMatrix;
            out vec3 vColor;
            void main() {
                vColor = color;
                gl_PointSize = 6.0;
                gl_Position = uMatrix * vec4(position, 1.0);
            }
        `;

        const fsSource = `#version 300 es
            precision highp float;
            in vec3 vColor;
            out vec4 fragColor;
            void main() {
                vec2 circ = gl_PointCoord * 2.0 - 1.0;
                if (dot(circ, circ) > 1.0) discard;
                fragColor = vec4(vColor, 0.8);
            }
        `;

        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2');
        if (!gl) alert("WebGL2 initialization failure.");

        canvas.width = 800; canvas.height = 500;
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.enable(gl.DEPTH_TEST);

        function buildShaderProgram(vsSrc, fsSrc) {
            const vs = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(vs, vsSrc); gl.compileShader(vs);
            const fs = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(fs, fsSrc); gl.compileShader(fs);
            const prog = gl.createProgram(); gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
            return prog;
        }
        const program = buildShaderProgram(vsSource, fsSource); gl.useProgram(program);

        const MAX_POINTS = 5000;
        const vertexBufferData = new Float32Array(MAX_POINTS * 3);
        const colorBufferData = new Float32Array(MAX_POINTS * 3);
        let activePointCount = 0, pointInsertionIndex = 0;

        const vboScatterPos = gl.createBuffer();
        const vboScatterCol = gl.createBuffer();
        const uScatterMatrixLoc = gl.getUniformLocation(program, "uMatrix");

        const channelColors = [[0,1,1], [1,0,0.5], [1,0.7,0], [0,1,0.5], [1,1,1]];

        // --- THE INGESTION BUS RECEPTOR ---
        // Catches cross-window variables and transforms them instantly into 3D points
        telemetryBus.onmessage = function(event) {
            let positions = event.data.positions;
            let timeMs = event.data.timeMs;

            for(let i=0; i<5; i++) {
                for(let j=i+1; j<5; j++) {
                    if (Math.abs(positions[i] - positions[j]) < 0.05) {
                        let xCoord = (positions[i] * 2.0 - 1.0) * 0.8;
                        let yCoord = (positions[j] * 2.0 - 1.0) * 0.8;
                        let zCoord = (Math.sin(timeMs * 0.0005) * Math.cos(positions[i] * 3.14)) * 0.5;

                        let bufIdx = pointInsertionIndex * 3;
                        vertexBufferData[bufIdx]   = xCoord;
                        vertexBufferData[bufIdx+1] = yCoord;
                        vertexBufferData[bufIdx+2] = zCoord;

                        colorBufferData[bufIdx]   = channelColors[i];
                        colorBufferData[bufIdx+1] = channelColors[i];
                        colorBufferData[bufIdx+2] = channelColors[i];

                        pointInsertionIndex = (pointInsertionIndex + 1) % MAX_POINTS;
                        if (activePointCount < MAX_POINTS) activePointCount++;
                    }
                }
            }
        };

        function getMatrix3D(angle) {
            let c = Math.cos(angle), s = Math.sin(angle);
            return new Float32Array([c,0,-s,0, 0,1,0,0, s,0,c,0, 0,0,-0.5,1]);
        }

        let cloudRotationAngle = 0;

        function renderEngineLoop() {
            gl.clearColor(0.01, 0.01, 0.02, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

            if (activePointCount > 0) {
                cloudRotationAngle += 0.005;
                gl.uniformMatrix4fv(uScatterMatrixLoc, false, getMatrix3D(cloudRotationAngle));

                const sPosLoc = gl.getAttribLocation(program, "position");
                gl.bindBuffer(gl.ARRAY_BUFFER, vboScatterPos);
                gl.bufferData(gl.ARRAY_BUFFER, vertexBufferData, gl.DYNAMIC_DRAW);
                gl.enableVertexAttribArray(sPosLoc);
                gl.vertexAttribPointer(sPosLoc, 3, gl.FLOAT, false, 0, 0);

                const sColLoc = gl.getAttribLocation(program, "color");
                gl.bindBuffer(gl.ARRAY_BUFFER, vboScatterCol);
                gl.bufferData(gl.ARRAY_BUFFER, colorBufferData, gl.DYNAMIC_DRAW);
                gl.enableVertexAttribArray(sColLoc);
                gl.vertexAttribPointer(sColLoc, 3, gl.FLOAT, false, 0, 0);

                gl.drawArrays(gl.POINTS, 0, activePointCount);
            }

            document.getElementById('vertexCounter').innerText = `VERTICES MAPPED: ${activePointCount} / ${MAX_POINTS}`;
            requestAnimationFrame(renderEngineLoop);
        }
        requestAnimationFrame(renderEngineLoop);
    </script>
</body>
</html>
